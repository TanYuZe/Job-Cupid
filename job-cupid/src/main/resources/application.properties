spring.application.name=job-cupid

# ── DataSource (PostgreSQL via docker-compose on port 5433) ──────────────────
spring.datasource.url=jdbc:postgresql://localhost:5433/jobcupid
spring.datasource.username=jobcupid
spring.datasource.password=jobcupid
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# ── Redis ────────────────────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
# Spring Session is NOT needed — this is a stateless JWT API (no HTTP sessions)
spring.session.store-type=none

# ── Kafka ────────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=jobcupid-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.jobcupid.*

# ── JWT ──────────────────────────────────────────────────────────────────────
# CHANGE THIS to any 32+ character random string before deploying
jwt.secret=dev-local-secret-key-change-me-in-prod-32chars
jwt.access-token-ttl-seconds=900
jwt.refresh-token-ttl-seconds=604800

# ── AWS (S3 photo uploads — set real values when needed) ─────────────────────
aws.region=ap-southeast-1
aws.s3.bucket-name=jobcupid-photos-dev

# ── Multipart ────────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.jobcupid=DEBUG
logging.level.org.springframework.security=INFO
